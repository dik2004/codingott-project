<body>

    <div class="notes-app">

        <!-- Sidebar -->
        <aside class="sidebar">

            <div class="logo">
                <i class="ri-sticky-note-line"></i>
                <h2>NotesHub</h2>
            </div>

            <div class="menu">

                <button id="newNoteBtn" onclick="createNote()">
                    <i class="ri-add-circle-line"></i>
                    Create Note
                </button>

                <label id="loadNoteBtn" for="fileInput">
                    <i class="ri-folder-open-line"></i>
                    Load Note

                </label>

                <input type="file" accept=".txt" hidden id="fileInput" onchange="loadNotes()">

            </div>

        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <div class="top-bar">
                <h1>Notes Management System</h1>
            </div>

            <!-- Form -->
            <div class="note-box">

                <div class="input-group">
                    <label>Note File Name</label>
                    <input type="text" id="noteTitle" placeholder="Enter file name">
                </div>

                <div class="input-group">
                    <label>Write Your Notes</label>
                    <textarea id="noteContent" rows="12" placeholder="Write your notes here..."></textarea>
                </div>

            </div>

        </main>

    </div>
