<body>

    <!-- ========== Audio Player Project UI ========== -->

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="ri-music-2-fill"></i>
                <h2>Audio Player</h2>
            </div>

            <button class="btn" id="selectBtn">
                <i class="ri-folder-music-line"></i>
                <span>Select Music</span>
            </button>

            <input type="file" id="audioInput" accept="audio/*" hidden />
        </header>

        <!-- Main -->
        <main class="main">

            <!-- No Music Found Screen -->
            <section class="no-music active" id="noMusicScreen">
                <div class="no-music-box">
                    <i class="ri-emotion-sad-line"></i>
                    <h3>No Music Found</h3>
                    <p>Please select an audio file to start playing.</p>
                </div>
            </section>

            <!-- Player Screen -->
            <section class="player" id="playerScreen">

                <!-- File Details -->
                <div class="file-details">
                    <div class="detail">
                        <i class="ri-file-music-line"></i>
                        <div>
                            <p class="label">Music Name</p>
                            <h4 id="musicName">---</h4>
                        </div>
                    </div>

                    <div class="detail">
                        <i class="ri-hard-drive-2-line"></i>
                        <div>
                            <p class="label">Music Size</p>
                            <h4 id="musicSize">---</h4>
                        </div>
                    </div>
                </div>

                <!-- Progress Section -->
                <div class="progress-wrapper">
                    <div class="time">
                        <span id="currentTime">00:00</span>
                        <span id="totalDuration">00:00</span>
                    </div>

                    <input type="range" id="progressBar" value="0" min="0" max="100" />
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="control-btn" id="backwardBtn" title="Backward 10s">
                        <i class="ri-rewind-mini-fill"></i>
                    </button>

                    <button class="control-btn play-btn" id="playPauseBtn" title="Play">
                        <i class="ri-play-fill" id="playPauseIcon"></i>
                    </button>

                    <button class="control-btn" id="forwardBtn" title="Forward 10s">
                        <i class="ri-speed-mini-fill"></i>
                    </button>

                    <button class="control-btn" id="muteBtn" title="Mute">
                        <i class="ri-volume-up-fill" id="muteIcon"></i>
                    </button>

                    <button class="control-btn" id="loopBtn" title="Loop">
                        <i class="ri-repeat-2-line" id="loopIcon"></i>
                    </button>
                </div>

                <!-- Hidden Audio -->
                <audio id="audio"></audio>
            </section>

        </main>
    </div>
