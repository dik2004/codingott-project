<body>

    <div class="main-container">

        <!-- ================= TASK 1 ================= -->
        <div class="card">
            <h1 class="main-heading">
                <i class="ri-palette-line"></i> Task 1 - Color Picker
            </h1>

            <div class="content-box">
                <h2 class="title active" id="title" onclick="elementSelector('title')">
                    Card Title
                </h2>

                <p class="desc" id="desc" onclick="elementSelector('desc')">
                    This is a description. Click on title or description, then pick a color to change only that text.
                </p>
            </div>

            <div class="controls">
                <label class="label">
                    <i class="ri-brush-line"></i> Pick Color
                </label>

                <input type="color" id="colorPicker">

                <div class="hex-box">
                    HEX Code: <span id="hexCode">#000000</span>
                </div>
            </div>
        </div>

        <!-- ================= TASK 2 ================= -->
        <div class="card">
            <h1 class="main-heading">
                <i class="ri-login-circle-line"></i> Task 2 - Login Form
            </h1>

            <form class="login-form" id="loginForm">

                <div class="input-box">
                    <label>Email ID</label>
                    <div class="input-field">
                        <i class="ri-mail-line"></i>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <div class="input-field">
                        <i class="ri-lock-line"></i>
                        <input type="password" placeholder="Enter your password" required minlength="6" maxlength="25">
                    </div>
                </div>

                <button type="submit" class="btn">
                    <i class="ri-login-box-line"></i> Login
                </button>

                <p class="message" id="message"></p>

            </form>
        </div>

    </div>
