<body>

    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="ri-image-line"></i>
                </div>
                <div class="logo-text">
                    <h1>Image Vault</h1>
                    <p>Upload, Preview & Manage Your Photos</p>
                </div>
            </div>

            <div class="header-actions">
                <button class="btn btn-outline" id="clearAllBtn">
                    <i class="ri-delete-bin-line"></i>
                    Clear All
                </button>
            </div>
        </header>

        <!-- Main -->
        <main class="main">

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">
                    <i class="ri-gallery-line"></i>
                </div>
                <h2>No Images Found</h2>
                <p>Please upload your images using the button below.</p>
            </div>

            <!-- Gallery -->
            <div class="gallery" id="gallery"></div>

        </main>

        <!-- Upload Bar Bottom -->
        <div class="upload-bar">
            <input type="file" id="imageInput" accept="image/*" hidden multiple />

            <button class="btn btn-primary upload-btn" id="uploadBtn">
                <i class="ri-upload-cloud-2-line"></i>
                Upload Images
            </button>
        </div>

    </div>

    <!-- View Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-overlay"></div>

        <div class="modal-content">
            <button class="modal-close" id="closeViewModal">
                <i class="ri-close-line"></i>
            </button>

            <div class="modal-image-box">
                <img id="modalImage" src="" alt="Preview Image" />
            </div>

            <div class="modal-info">
                <p id="modalImageName">
                    <i class="ri-image-2-line"></i>
                    <span></span>
                </p>
                <p id="modalImageSize">
                    <i class="ri-file-info-line"></i>
                    <span></span>
                </p>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Popup -->
    <div class="popup" id="deletePopup">
        <div class="popup-overlay"></div>

        <div class="popup-box">
            <div class="popup-icon">
                <i class="ri-error-warning-line"></i>
            </div>

            <h2>Delete Image?</h2>
            <p>This action cannot be undone. Are you sure you want to delete this image?</p>

            <div class="popup-actions">
                <button class="btn btn-outline" id="cancelDelete">
                    Cancel
                </button>
                <button class="btn btn-danger" id="confirmDelete">
                    Confirm Delete
                </button>
            </div>
        </div>
    </div>
