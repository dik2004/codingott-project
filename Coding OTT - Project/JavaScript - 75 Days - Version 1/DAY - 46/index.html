<body>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="ri-file-pdf-2-fill"></i>
                <h2>PDF Viewer</h2>
            </div>

            <p class="tagline">Upload your PDF and preview instantly inside iframe.</p>
        </header>

        <!-- Upload Section -->
        <section class="upload-section">
            <input type="file" id="pdfInput" accept="application/pdf" hidden />

            <button class="btn" id="uploadBtn">
                <i class="ri-upload-cloud-2-line"></i>
                <span id="btnText">Select File</span>
            </button>

            <div class="pdf-details" id="pdfDetails">
                <h3>PDF Details</h3>

                <div class="detail-row">
                    <span class="label"><i class="ri-file-text-line"></i> Name:</span>
                    <span class="value" id="pdfName">---</span>
                </div>

                <div class="detail-row">
                    <span class="label"><i class="ri-database-2-line"></i> Size:</span>
                    <span class="value" id="pdfSize">---</span>
                </div>

                <div class="detail-row">
                    <span class="label"><i class="ri-calendar-event-line"></i> Last Modified:</span>
                    <span class="value" id="pdfDate">---</span>
                </div>
            </div>
        </section>

        <!-- Preview Section -->
        <section class="preview-section">
            <div class="no-pdf" id="noPdfBox">
                <i class="ri-file-warning-line"></i>
                <h2>No PDF Found</h2>
                <p>Please select a PDF file to preview here.</p>
            </div>

            <iframe id="pdfFrame" class="pdf-frame"></iframe>
        </section>
    </div>
