<body>

  <header class="topbar">
    <div class="container topbar-flex">
      <div class="brand">
        <i class="ri-school-line"></i>
        <span>MarksheetPro</span>
      </div>

      <a href="../index.html" class="btn btn-outline">
        <i class="ri-home-line"></i> Home
      </a>
    </div>
  </header>

  <section style="padding:50px 0;">
    <div class="container">
      <div class="card">
        <h1 class="page-title">School Registration</h1>
        <p class="page-subtitle">Register your school to start managing students and marksheets.</p>

        <div id="msgBox"></div>

        <form onsubmit="registerSchool(event)">
          <div class="form-grid">
            <div class="input-group">
              <label>School Name</label>
              <input type="text" id="schoolName" placeholder="Enter School Name">
            </div>

            <div class="input-group">
              <label>Email</label>
              <input type="email" id="schoolEmail" placeholder="Enter Email">
            </div>

            <div class="input-group">
              <label>Number</label>
              <input type="text" id="schoolNumber" placeholder="Enter Phone Number">
            </div>

            <div class="input-group">
              <label>Password</label>
              <input type="password" id="schoolPassword" placeholder="Enter Password">
            </div>

            <div class="input-group">
              <label>Address</label>
              <input type="text" id="schoolAddress" placeholder="Enter Address">
            </div>

            <div class="input-group">
              <label>School Logo</label>
              <input type="file" id="schoolLogo" accept="image/*" required>
            </div>

            <div class="input-group">
              <label>Tagline</label>
              <input type="text" id="schoolTagline" placeholder="Enter Tagline">
            </div>

            <div class="input-group">
              <label>Registration Number</label>
              <input type="text" id="schoolRegNo" placeholder="Enter Registration Number">
            </div>

            <div class="input-group">
              <label>Registration Date</label>
              <input type="date" id="schoolRegDate">
            </div>

            <div class="input-group">
              <label>Medium</label>
              <select id="schoolMedium" onchange="mediumSelector(this.value)">
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
              </select>
            </div>
          </div>

          <div class="input-group">
            <label>Description</label>
            <textarea id="schoolDescription" placeholder="Enter Description"></textarea>
          </div>

          <button class="btn btn-primary w-100">
            <i class="ri-user-add-line"></i> Register School
          </button>

          <p style="text-align:center; margin-top:14px; font-size:14px;">
            Already Registered? <a href="./login.html" style="color:var(--primary); font-weight:700;">Login Now</a>
          </p>
        </form>
      </div>
    </div>
  </section>

</body>

</html>
