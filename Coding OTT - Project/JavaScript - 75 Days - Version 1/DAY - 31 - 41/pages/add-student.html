<body>

    <aside class="sidebar">

      <a href="./add-marksheet.html"><i class="ri-file-add-line"></i> Add Marksheet</a>

      <a href="#" onclick="logoutSchool()"><i class="ri-logout-box-line"></i> Logout</a>

    <main class="main-content">
      <div class="card">
        <h1 class="page-title" id="studentFormTitle">Add New Student</h1>
        <p class="page-subtitle">Fill student details properly.</p>

        <div id="msgBox"></div>

        <form>
          <div class="form-grid">

            <div class="input-group">
              <label>Candidate Name</label>
              <input type="text" id="candidateName">
            </div>

            <div class="input-group">
              <label>Student Photo</label>
              <input type="file" id="studentPhoto">
            </div>

            <div class="input-group">
              <label>Email</label>
              <input type="email" id="studentEmail">
            </div>

            <div class="input-group">
              <label>Number</label>
              <input type="text" id="studentNumber">
            </div>

            <div class="input-group">
              <label>Father Name</label>
              <input type="text" id="fatherName">
            </div>

            <div class="input-group">
              <label>Father Email</label>
              <input type="email" id="fatherEmail">
            </div>

            <div class="input-group">
              <label>Father Number</label>
              <input type="text" id="fatherNumber">
            </div>

            <div class="input-group">
              <label>Mother Name</label>
              <input type="text" id="motherName">
            </div>

            <div class="input-group">
              <label>Mother Email</label>
              <input type="email" id="motherEmail">
            </div>

            <div class="input-group">
              <label>Mother Number</label>
              <input type="text" id="motherNumber">
            </div>

            <div class="input-group">
              <label>DOB</label>
              <input type="date" id="dob">
            </div>

            <div class="input-group">
              <label>Class</label>
              <input type="text" id="studentClass">
            </div>

            <div class="input-group">
              <label>Admission Date</label>
              <input type="date" id="admissionDate">
            </div>

            <div class="input-group">
              <label>Roll Number</label>
              <input type="text" id="rollNumber">
            </div>

            <div class="input-group">
              <label>Stream</label>
              <input type="text" id="stream">
            </div>

            <div class="input-group">
              <label>Address</label>
              <input type="text" id="studentAddress">
            </div>

          </div>

          <button class="btn btn-primary w-100" id="studentBtn" onclick="formVal(event)">
            <i class="ri-save-line"></i> Save Student
          </button>

          <button class="btn btn-primary w-100" id="updateStudentBtn" onclick="updateFormVal(event)">
            <i class="ri-save-line"></i> Update Student
          </button>

        </form>
      </div>
    </main>

  </div>

</body>
