<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Marksheet</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body onload="protectPage(); loadSingleMarksheet();">

<div class="dashboard">

  <aside class="sidebar">
    <div class="brand">
      <i class="ri-school-line"></i>
      <span>MarksheetPro</span>
    </div>

    <a href="dashboard.html"><i class="ri-dashboard-line"></i> Dashboard</a>
    <a href="manage-marksheet.html" class="active"><i class="ri-file-list-3-line"></i> Manage Marksheet</a>

    <a href="#" onclick="logoutSchool()"><i class="ri-logout-box-line"></i> Logout</a>
  </aside>

  <main class="main-content">

    <div class="marksheet" id="marksheetPrintArea">

      <div class="marksheet-header">
        <img id="msLogo" src="">
        <div>
          <h2 id="msSchoolName"></h2>
          <p id="msTagline"></p>
          <p>Address: <span id="msAddress"></span></p>
          <p>Phone: <span id="msNumber"></span></p>
        </div>
      </div>

      <div class="student-preview">
        <img id="msStudentPhoto" src="">
        <div>
          <h3 id="msStudentName"></h3>
          <p>Class: <b id="msStudentClass"></b> | Roll: <b id="msStudentRoll"></b></p>
          <p>Father: <b id="msFather"></b> | Mother: <b id="msMother"></b></p>
          <p>Email: <b id="msEmail"></b></p>
        </div>
      </div>

      <div class="table-wrapper">
        <table style="min-width:600px;">
          <thead>
            <tr>
              <th>#</th>
              <th>Subject</th>
              <th>Total</th>
              <th>Obtained</th>
            </tr>
          </thead>
          <tbody id="msSubjectBody"></tbody>
        </table>
      </div>

      <div style="display:flex; gap:14px; flex-wrap:wrap; margin-top:14px;">
        <p><b>Total:</b> <span id="msTotal"></span></p>
        <p><b>Obtained:</b> <span id="msObtained"></span></p>
        <p><b>Percentage:</b> <span id="msPercentage"></span></p>
        <p><b>Result:</b> <span id="msResult"></span></p>
      </div>

      <div class="footer-note">
        <p><b>Creator:</b> <span id="msCreator"></span></p>
        <p><b>Printed Date:</b> <span id="msPrinted"></span></p>
        <p><b>Created Date:</b> <span id="msCreated"></span></p>
        <p><b>Updated Date:</b> <span id="msUpdated"></span></p>

        <div class="social-links">
          <a href="#"><i class="ri-facebook-fill"></i></a>
          <a href="#"><i class="ri-instagram-line"></i></a>
          <a href="#"><i class="ri-linkedin-fill"></i></a>
          <a href="#"><i class="ri-youtube-fill"></i></a>
        </div>
      </div>

    </div>

    <div style="display:flex; gap:12px; margin-top:18px; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="downloadPDF()">
        <i class="ri-file-pdf-2-line"></i> Save as PDF
      </button>

      <button class="btn btn-outline" onclick="window.print()">
        <i class="ri-printer-line"></i> Print
      </button>

      <a href="manage-marksheet.html" class="btn btn-outline">
        <i class="ri-arrow-left-line"></i> Back
      </a>
    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
