<body>

  <header class="topbar">
    <div class="container topbar-flex">
      <div class="brand">
        <i class="ri-school-line"></i>
        <span>MarksheetPro</span>
      </div>

      <a href="../index.html" class="btn btn-outline">
        <i class="ri-home-line"></i> Home
      </a>
    </div>
  </header>

  <section style="padding:60px 0;">
    <div class="container" style="max-width:550px;">
      <div class="card">
        <h1 class="page-title">School Login</h1>
        <p class="page-subtitle">Login to access your dashboard.</p>

        <div id="msgBox"></div>

        <form onsubmit="loginSchool(event)">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter Email">
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter Password">
          </div>

          <button class="btn btn-primary w-100">
            <i class="ri-login-circle-line"></i> Login
          </button>

          <p style="text-align:center; margin-top:14px; font-size:14px;">
            Don't have account? <a href="./register.html" style="color:var(--primary); font-weight:700;">Register
              Now</a>
          </p>
        </form>
      </div>
    </div>
  </section>
